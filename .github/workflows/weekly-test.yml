name: Weekly E2E Regression Tests (Python/Pytest)

on:
  schedule:
    # Chạy vào 00:00 AM mỗi sáng Thứ Hai hàng tuần (theo giờ UTC)
    - cron: '0 0 * * 1'
  workflow_dispatch: # Cho phép chạy thủ công bất cứ lúc nào

jobs:
  e2e-testing:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ensure Playwright Browsers are installed
      run: playwright install --with-deps

    - name: Run Pytest Tests
      run: |
        pytest --html=report.html --self-contained-html --junitxml=results.xml
      continue-on-error: true # Đảm bảo step sau vẫn chạy để tạo báo cáo

    - name: Upload Test Report (HTML)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pytest-report
        path: |
          report.html
          screenshots/
          videos/
        retention-days: 30

    - name: Send Summary to GitHub Step Summary
      if: always()
      run: |
        # Đọc kết quả từ file xml để báo cáo lên Summary
        # Cài đặt một công cụ nhỏ để đọc xml nếu cần, hoặc dùng lệnh đơn giản
        echo "### 📊 BÁO CÁO KIỂM THỬ HÀNG TUẦN (PYTHON/PYTEST)" >> $GITHUB_STEP_SUMMARY
        echo "Vui lòng kiểm tra file **report.html** trong phần Artifacts để xem chi tiết hình ảnh và video lỗi." >> $GITHUB_STEP_SUMMARY
        if [ -f "report.html" ]; then
          echo "✅ Đã tạo báo cáo thành công." >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Báo cáo chưa được tạo. Kiểm tra log chạy test." >> $GITHUB_STEP_SUMMARY
        fi
