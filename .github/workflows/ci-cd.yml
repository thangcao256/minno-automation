name: CI/CD E2E Regression

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ensure Playwright Browsers are installed
      run: playwright install --with-deps chromium

    - name: Run Tests
      env:
        BASE_URL: ${{ secrets.BASE_URL || 'https://demo.minno.vn' }}
        ADMIN_USER: ${{ secrets.ADMIN_USER }}
        ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
      run: |
        # Đảm bảo thư mục kết quả tồn tại
        mkdir -p allure-results
        # Đọc file test_suite.txt, loại bỏ comment, dòng trống và ký tự \r của Windows
        TEST_FILES=$(sed 's/\r//' test_suite.txt | grep -v '^#' | grep -v '^$' | tr '\n' ' ')
        echo "Running tests: $TEST_FILES"
        if [ -z "$TEST_FILES" ]; then
          echo "No tests found in test_suite.txt"
          exit 0
        fi
        pytest $TEST_FILES --alluredir=allure-results
      continue-on-error: true

    - name: Allure Report Action
      uses: simple-elf/allure-report-action@master
      if: always()
      with:
        allure_results: allure-results
        allure_report: allure-report
        allure_history: allure-history
        keep_reports: 20

    - name: Deploy report to Github Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: allure-report
        publish_branch: gh-pages
        force_orphan: true

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          allure-results/
          screenshots/
          videos/
        retention-days: 7
