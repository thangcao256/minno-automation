[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    --browser=chromium
    --screenshot=only-on-failure
    --video=retain-on-failure
    --alluredir=allure-results
    --html=report.html --self-contained-html

log_cli = false
log_cli_level = INFO